<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 300" width="100%" height="100%">

  <g transform="translate(75,0) scale(0.6)">

    <!-- SEPTAGON BACKGROUND FILL -->
    <path d="
      M 250 90
      L 375.1 150.3
      L 406.4 287.4
      L 319.4 394.3
      L 180.6 394.3
      L 93.6 287.4
      L 124.9 150.3
      Z"
      fill="#090618"
      opacity="1" />

    <!-- STRUCTURE LINES (Unified weight, exact palette colors, no faux-shadow noise) -->
    <g stroke-linecap="round" stroke-width="6">
      <line x1="250" y1="90" x2="375.1" y2="150.3" stroke="#f05465"/> <!-- Crimson -->
      <line x1="375.1" y1="150.3" x2="406.4" y2="287.4" stroke="#e2a700"/> <!-- Gold -->
      <line x1="406.4" y1="287.4" x2="319.4" y2="394.3" stroke="#64cf80"/> <!-- Jade -->
      <line x1="319.4" y1="394.3" x2="180.6" y2="394.3" stroke="#29c4b1"/> <!-- Teal -->
      <line x1="180.6" y1="394.3" x2="93.6" y2="287.4" stroke="#06bfe7"/> <!-- Glacier -->
      <line x1="93.6" y1="287.4" x2="124.9" y2="150.3" stroke="#7dc9ff"/> <!-- Periwinkle -->
      <line x1="124.9" y1="150.3" x2="250" y2="90" stroke="#ed71b6"/> <!-- Rose -->
    </g>

    <!-- INNER CURVE (V for Varium) -->
    <path d="M 140,275 C 200,275 220,175 250,175 C 280,175 300,275 360,275"
          fill="none"
          stroke="#e3e2f6"
          stroke-width="6"
          stroke-linecap="round"
          opacity="0.92" />

    <!-- NODES (Exact palette colors) -->
    <circle cx="250" cy="90" r="13" fill="#f05465" />
    <circle cx="375.1" cy="150.3" r="11" fill="#e2a700" />
    <circle cx="406.4" cy="287.4" r="11" fill="#64cf80" />
    <circle cx="319.4" cy="394.3" r="11" fill="#29c4b1" />
    <circle cx="180.6" cy="394.3" r="11" fill="#06bfe7" />
    <circle cx="93.6" cy="287.4" r="11" fill="#7dc9ff" />
    <circle cx="124.9" cy="150.3" r="11" fill="#ed71b6" />

  </g>

</svg>
